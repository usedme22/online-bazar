{% extends 'home.html' %}
{% load static %}
{% block title %}
<title>Online Bazar | Payment</title>
{% endblock %}
{% block content %}
<div class="container p-3 mt-3 mb-3">
  <div class="row">
    <button id="rzp-button1"style="border: none;">
    <h5 class="background text-light w-100 p-2">Pay</h5></button>
  </div>
</div>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
  var options = {
    "key": "{{api_key}}", // Enter the Key ID generated from the Dashboard
    "name": "Online Bazar",
    "description": "Test Transaction",
    "order_id": "{{order_id}}", //This is a sample Order ID. Pass the `id` obtained in the response of Step 1
    "handler": function (response) {
      // alert(response.razorpay_payment_id);
      // alert(response.razorpay_order_id);
      // alert(response.razorpay_signature)
      window.open("/paymentSuccess/"+response.razorpay_payment_id+"/"+response.razorpay_order_id+"/"+response.razorpay_signature+"/")
    },

    "prefill": {
      "name": "{{User.name}}",
      "email": "{{User.email}}",
      "contact": "{{User.phone}}"
    },
    "notes": {
      "address": "Razorpay Corporate Office"
    },
    "theme": {
      "color": "#3399cc"
    }
  };
  var rzp1 = new Razorpay(options);

  rzp1.on('payment.failed', function (response) {
    window.location.href = "/checkout/";
  });

  document.getElementById('rzp-button1').onclick = function (e) {
    rzp1.open();
    e.preventDefault();
  };
</script>

{% endblock %}
